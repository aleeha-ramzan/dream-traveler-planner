<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Traveler Planner — Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="stars"></div>

<div class="auth-card">
  <h1 class="auth-title">✈️ Dream Traveler Planner</h1>
  <p class="auth-subtitle">Plan the trips you dream about</p>

  <div class="auth-tabs">
    <button class="auth-tab active" id="loginTab">Login</button>
    <button class="auth-tab" id="registerTab">Register</button>
  </div>

  <p class="auth-error" id="authError"></p>

  <!-- LOGIN FORM -->
  <form id="loginForm" class="auth-form">
    <label>Email</label>
    <input type="email" id="loginEmail" required placeholder="you@example.com">
    <label>Password</label>
    <input type="password" id="loginPassword" required placeholder="••••••••">
    <button type="submit" class="btn primary auth-submit">Login</button>
  </form>

  <!-- REGISTER FORM -->
  <form id="registerForm" class="auth-form" style="display:none;">
    <label>Full Name</label>
    <input type="text" id="regName" required placeholder="Your Name">
    <label>Email</label>
    <input type="email" id="regEmail" required placeholder="you@example.com">
    <label>Password</label>
    <input type="password" id="regPassword" required placeholder="Min. 6 characters" minlength="6">
    <button type="submit" class="btn primary auth-submit">Create Account</button>
  </form>

  <p class="auth-note">🔒 Admin accounts are created separately for security and are not available through public registration.</p>
</div>

<script src="login.js"></script>
</body>
</html>
